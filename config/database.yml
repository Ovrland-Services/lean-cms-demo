default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

test:
  <<: *default
  database: storage/test.sqlite3

# Single SQLite file holds everything (app data + Solid Queue + Solid Cache +
# Solid Cable). Keeps the demo's Kamal volume layout trivial.
production:
  <<: *default
  database: storage/production.sqlite3
